<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Походът на Ботевата чета - 1876</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./src/lib/leaflet.css" />
  <link rel="stylesheet" href="./src/lib/MarkerCluster.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MZRCLQS546"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MZRCLQS546');
  </script>
</head>

<body>

  <!-- ── Top navbar ─────────────────────────────────────────── -->
  <nav class="app-nav" role="navigation" aria-label="Навигация">
    <div class="app-nav-brand">
      <span class="app-nav-title">Походът на Ботевата чета <span class="app-nav-year">1876</span></span>
    </div>
    <div class="app-nav-actions">
      <!-- Participant search -->
      <button class="app-nav-btn" id="nav-search-btn" type="button" aria-label="Търси четник">
        <svg class="app-nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="app-nav-btn-label">Търси</span>
      </button>
      <!-- Show timeline panel -->
      <button class="app-nav-btn app-nav-btn--play" id="nav-play-btn" type="button" aria-label="Покажи похода">
        <svg class="app-nav-btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l10-6.5z"/></svg>
        <span class="app-nav-btn-label">Поход</span>
      </button>
      <!-- Data / info modal -->
      <button class="app-nav-btn app-nav-btn--data" id="nav-data-btn" type="button" aria-label="За данните и проекта">
        <svg class="app-nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span class="app-nav-btn-label">Данни</span>
      </button>
    </div>
  </nav>

  <!-- ── Search drawer ────────────────────────────────────── -->
  <div id="nav-search-drawer" class="nav-search-drawer" hidden>
    <div class="nav-search-inner">
      <svg class="nav-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="chetnitsi-search-input" class="chetnitsi-search-input"
             placeholder="Търси четник или населено място…" autocomplete="off" spellcheck="false" />
      <button id="chetnitsi-search-clear" class="chetnitsi-search-clear"
              type="button" aria-label="Изчисти" hidden>✕</button>
    </div>
    <ul id="chetnitsi-search-list" class="chetnitsi-search-list" hidden role="listbox"></ul>
  </div>

  <!-- ── Info / Data modal ───────────────────────────────────── -->
  <div id="info-modal" class="info-modal" role="dialog" aria-modal="true" aria-label="Данни за картата" hidden>
    <div class="info-modal-backdrop"></div>
    <div class="info-modal-sheet">
      <div class="info-modal-header">
        <h2 class="info-modal-title">Данни за картата</h2>
        <button class="info-modal-close" id="info-modal-close" type="button" aria-label="Затвори">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="info-modal-nav">
        <button class="info-modal-tab is-active" data-tab="route" type="button">Маршрутът</button>
        <button class="info-modal-tab" data-tab="april" type="button">Походът на Ботевата чета</button>
        <button class="info-modal-tab" data-tab="chetnitsi" type="button">Четници</button>
        <button class="info-modal-tab" data-tab="bibliography" type="button">Литература</button>
        <button class="info-modal-tab" data-tab="about" type="button">За проекта</button>
      </div>

      <div class="info-modal-body" id="info-modal-body">
        <!-- Filled dynamically by info-modal.js -->
      </div>
    </div>
  </div>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- Left info sidebar -->
  <aside id="sidebar" class="sidebar" role="complementary" aria-label="Информационен панел">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="sidebar-header-copy">
          <span id="sidebar-kicker" class="sidebar-kicker" hidden></span>
          <h2 id="sidebar-title" class="sidebar-title"></h2>
        </div>
        <button id="sidebar-close" class="sidebar-close" aria-label="Затвори панела">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div id="sidebar-content" class="sidebar-content"></div>
      <div id="sidebar-source" class="sidebar-source"></div>
    </div>
  </aside>

  <!-- Layer controls + legend, and collapsed timeline stub stacked together -->
  <div id="panel-stack">
    <div id="controls" class="controls-panel is-collapsed">
      <button id="controls-toggle" class="controls-toggle" aria-expanded="true" aria-label="Покажи/скрий слоевете">
        <span class="controls-toggle-label">Легенда</span>
        <svg class="controls-toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    <div class="controls-collapse">
      <div class="controls-collapse-inner">
        <div class="controls-body">
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-districts" checked />
            <span class="toggle-swatch toggle-swatch--district"></span>
            Окръзи
          </label>
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-okrazhen-centers" />
            <span class="toggle-swatch toggle-swatch--okrazhen"></span>
            Окръжни центрове
          </label>
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-points" />
            <span class="toggle-swatch toggle-swatch--major"></span>
            Селища
          </label>
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-detachments" />
            <span class="toggle-swatch toggle-swatch--detachment"></span>
            Чети
          </label>
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-apostolic" />
            <span class="toggle-swatch toggle-swatch--apostolic"></span>
            Апостолско събрание
          </label>
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-botev" checked />
            <span class="toggle-swatch toggle-swatch--botev"></span>
            Походът на Ботевата чета
          </label>
          <label class="layer-toggle">
            <input type="checkbox" id="toggle-chetnitsi" />
            <span class="toggle-swatch toggle-swatch--chetnitsi"></span>
            Ботеви четници по родни места
          </label>
        </div>
      </div>
    </div>
    </div>

  </div><!-- /#panel-stack -->

  <!-- Botev march timeline panel -->
  <div id="timeline" class="timeline-panel" role="region" aria-label="Хронология на Похода на Ботевата чета" hidden>
    <div class="timeline-shell">
      <div class="timeline-header">
        <div class="timeline-heading">
          <span class="timeline-eyebrow">Походът на Ботевата чета</span>
          <span class="timeline-date" id="timeline-date"></span>
        </div>
        <button id="timeline-collapse" class="timeline-collapse-btn" type="button" aria-label="Скрий панела" title="Смали панела">−</button>
      </div>
      <div class="timeline-name" id="timeline-name">Походът на Ботевата чета</div>
      <div id="timeline-popup" class="timeline-popup" hidden>
        <div class="timeline-popup-head">
          <span id="timeline-popup-kicker" class="timeline-popup-kicker">Етап</span>
          <h3 id="timeline-popup-title" class="timeline-popup-title"></h3>
        </div>
        <div id="timeline-popup-content" class="timeline-popup-content"></div>
        <div id="timeline-popup-source" class="timeline-popup-source"></div>
      </div>
      <div class="timeline-progress">
        <input type="range" id="timeline-slider" min="0" max="0" value="0" step="1" aria-label="Плъзгач на хронологията" />
      </div>
      <div class="timeline-controls">
        <button id="timeline-prev" class="timeline-btn" type="button" aria-label="Назад">‹ Назад</button>
        <button id="timeline-play" class="timeline-btn timeline-btn--play" type="button" aria-label="Пусни / Пауза">&#x25B6;&#xFE0E; Пусни</button>
        <button id="timeline-stop" class="timeline-btn" type="button" aria-label="Спри">&#x25A0;&#xFE0E; Спри</button>
        <button id="timeline-next" class="timeline-btn" type="button" aria-label="Напред">Напред ›</button>
      </div>
    </div>
  </div>

  <script src="./src/lib/leaflet.js"></script>
  <script src="./src/lib/leaflet.markercluster.js"></script>
  <script src="./src/lib/leaflet.curve.js"></script>
  <script src="./src/js/info-modal.js"></script>
  <script src="./src/js/navbar.js"></script>
  <script src="app.js"></script>

</body>

</html>
